# Name which will be displayed
# when opening the station
name: '&8Blacksmith Forge'

# The maximum amount of items in the crafting queue
max-queue-size: 10

# Command to open the crafting station UI
command:
  name: 'blacksmith'
  description: 'Open the blacksmith forge'
  usage: '/blacksmith'
  permission: 'mmoitems.blacksmith'
  aliases: [ bs, forge ]
  message:
    no-perm: '&cYou don''t have enough permissions.'
    not-a-player: '&cThis command is for players only.'

# Station recipes
recipes:
  craft_refined_carbon:
    output: 'mmoitem{type=MATERIAL,id=REFINED_CARBON}'
    crafting-time: 3
    lore:
      - '&7Smelt coal into a hotter-burning carbon.'
    ingredients:
      - 'vanilla{type=COAL,amount=2,display="Coal"}'
      
  craft_steel_ingot:
    output: 'mmoitem{type=MATERIAL,id=STEEL_INGOT}'
    crafting-time: 5
    lore:
      - '&7Forge iron and carbon into strong steel.'
    ingredients:
      - 'vanilla{type=IRON_INGOT,amount=1,display="Iron Ingot"}'
      - 'mmoitem{type=MATERIAL,id=REFINED_CARBON,amount=1,display="Refined Carbon"}'

gui-layout:
  # GUI display name
  name: '&8Blacksmith Forge ({page}/{max_page})'
  slots: 54
  enable_right_click_preview: true
  force_preview_on_click: false

  sound:
    craft: ENTITY_EXPERIENCE_ORB_PICKUP
    upgrade: ENTITY_EXPERIENCE_ORB_PICKUP
    queue_cancel: ENTITY_EXPERIENCE_ORB_PICKUP
    queue_claim: ENTITY_EXPERIENCE_ORB_PICKUP
    queue_add: ENTITY_EXPERIENCE_ORB_PICKUP

  items:
