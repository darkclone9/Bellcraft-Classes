        name: '&e&lUpgrade&f {name}'
        lore:
          - '{conditions}'
          - '{conditions}&8Conditions:'
          - '{ingredients}'
          - '{ingredients}&8Ingredients:'
          - '{lore}'
          - ''
          - '&e► Left click to upgrade!'
          - '&e► Right click to preview!'
