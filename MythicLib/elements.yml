FIRE:

  # Public translation MMOCore and MMOItems will use
  name: Fire

  # An item associated to your element. Used in the MI item editor
  icon: BLAZE_POWDER

  # Some nice looking icon, used in damage indicators and MI item lore
  lore-icon: '🔥'

  # A color associated to your element. Used in damage indicators as well as MI item lore
  color: '&c'

  # What gets executed when a normal elemental is performed
  regular-attack: 'mythiclib:fire_elemental_attack'

  # What gets executed when a elemental critical strike is performed
  # This one is optional. If not specified, no crits can occur
  crit-strike: 'mythiclib:fire_critical_strike'

