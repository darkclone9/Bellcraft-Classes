- 'Spiders have infested the outskirts'
- 'of the settlement. Their webs are'
- 'everywhere. Squash them!'
- ''
- '&eRewards:'
- '&7► 70 EXP'
- '&7► 5 Gold Coins'

parent: []

bossbar:
