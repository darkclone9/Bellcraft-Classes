
# Display options
name: 'Nether Vanguard'
lore:
- 'The Nether fortress must be breached.'
- 'Blazes and wither skeletons guard the'
- 'gates. Only the bold will survive!'
- ''
- '&eRewards:'
- '&7► 400 EXP'
- '&7► 40 Gold Coins'
- '&7► Rare Weapon Essence'

level-req:
    main: 10

parent:
- 'skeleton-army'

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'killmob{type=BLAZE;amount=10}'
        lore: 'Kill 10 blazes.'
        triggers:
        - message{format="&aCommander> &fThe blaze spawners are silenced! Push deeper into the fortress!"}
        - sound{sound=ENTITY_EXPERIENCE_ORB_PICKUP;pitch=1;volume=1}
    2:
        type: 'killmob{type=WITHER_SKELETON;amount=8}'
        lore: 'Kill 8 wither skeletons.'
        triggers:
        - message{format="&aCommander> &fThe fortress is ours! You are a true vanguard of the Nether."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 40"}
        - 'mmoitem{type=MATERIAL;id=RARE_WEAPON_ESSENCE}'
        - 'experience{amount=400}'
