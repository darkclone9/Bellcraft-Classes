
# Display options
name: 'Ender Expedition'
lore:
- 'The endermen grow in number, tearing'
- 'holes in reality. Launch an expedition'
- 'to thin their ranks once and for all!'
- ''
- '&eRewards:'
- '&7► 900 EXP'
- '&7► 90 Gold Coins'
- '&7► Legendary Weapon Essence'

level-req:
    main: 20

parent:
- 'enderman-stalker'

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'killmob{type=ENDERMAN;amount=25}'
        lore: 'Kill 25 endermen.'
        triggers:
        - message{format="&aAncient Sage> &fThe veil stabilizes. Reality itself thanks you."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 90"}
        - 'mmoitem{type=MATERIAL;id=LEGENDARY_WEAPON_ESSENCE}'
        - 'experience{amount=900}'
