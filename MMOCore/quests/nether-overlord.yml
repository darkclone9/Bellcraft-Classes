
# Display options
name: 'Nether Overlord'
lore:
- 'The Nether must be fully dominated.'
- 'Blazes, wither skeletons, and hoglins'
- 'all stand in your way. Conquer them all!'
- ''
- '&eRewards:'
- '&7► 1000 EXP'
- '&7► 100 Gold Coins'
- '&7► Falcon Blade'

level-req:
    main: 20

parent:
- 'fortress-assault'

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'killmob{type=BLAZE;amount=20}'
        lore: 'Kill 20 blazes.'
        triggers:
        - message{format="&aWarmaster> &fThe fires are quenched! Press on to the wither skeletons!"}
        - sound{sound=ENTITY_EXPERIENCE_ORB_PICKUP;pitch=1;volume=1}
    2:
        type: 'killmob{type=WITHER_SKELETON;amount=15}'
        lore: 'Kill 15 wither skeletons.'
        triggers:
        - message{format="&aWarmaster> &fThe dark warriors crumble! Now clear the hoglins from the crimson forest!"}
        - sound{sound=ENTITY_EXPERIENCE_ORB_PICKUP;pitch=1;volume=1}
    3:
        type: 'killmob{type=HOGLIN;amount=10}'
        lore: 'Kill 10 hoglins.'
        triggers:
        - message{format="&aWarmaster> &fThe Nether bends to your will! You are its true overlord."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 100"}
        - 'mmoitem{type=SWORD;id=FALCON_BLADE}'
        - 'experience{amount=1000}'
