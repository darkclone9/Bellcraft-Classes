
# Display options
name: 'The Gilded Path'
lore:
- 'Gold is worth more than just coin.'
- 'A traveling alchemist needs gold ingots'
- 'for their experiments. Mine the ore!'
- ''
- '&eRewards:'
- '&7► 150 EXP'
- '&7► 15 Gold Coins'

level-req:
