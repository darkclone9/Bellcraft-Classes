        - message{format="&aScout> &fThe night sky is clear! No more swooping terrors."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 42"}
        - 'experience{amount=420}'
