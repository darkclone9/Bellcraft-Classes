
# Display options
name: 'Phantom Slayer'
lore:
- 'The phantoms grow bolder each night,'
- 'diving from the sky in great swarms.'
- 'Shoot them down and reclaim the night!'
- ''
- '&eRewards:'
- '&7► 420 EXP'
- '&7► 42 Gold Coins'

level-req:
    main: 13

parent:
- 'night-watch'

bossbar:
