
# Display options
name: 'Swamp Clearance'
lore:
- 'The swamps are overrun with drowned and'
- 'witches. The villagers live in fear.'
- 'Cleanse this cursed land!'
- ''
- '&eRewards:'
- '&7► 220 EXP'
- '&7► 22 Gold Coins'

level-req:
    main: 7

parent:
- 'river-fisher'

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'killmob{type=DROWNED;amount=15}'
        lore: 'Kill 15 drowned.'
        triggers:
        - message{format="&aElder> &fThe waters recede! Now deal with the witches deeper in."}
        - sound{sound=ENTITY_EXPERIENCE_ORB_PICKUP;pitch=1;volume=1}
    2:
        type: 'killmob{type=WITCH;amount=10}'
        lore: 'Kill 10 witches.'
        triggers:
        - message{format="&aElder> &fThe swamp is purified at last! You have our deepest gratitude."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 22"}
        - 'experience{amount=220}'
