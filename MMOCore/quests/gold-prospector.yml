
# Display options
name: 'Gold Prospector'
lore:
- 'Gold veins have been discovered deep'
- 'underground. The merchants will pay'
- 'handsomely for a rich haul!'
- ''
- '&eRewards:'
- '&7► 180 EXP'
- '&7► 18 Gold Coins'

level-req:
    main: 6

parent: []

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'mineblock{type=GOLD_ORE;amount=15}'
        lore: 'Mine 15 gold ore.'
        triggers:
        - message{format="&aMiner> &fStrike it rich! That is a fortune in gold right there."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 18"}
        - 'experience{amount=180}'
