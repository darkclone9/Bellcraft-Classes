
# Display options
name: 'Lapis Expedition'
lore:
- 'The enchanters guild requires lapis'
- 'lazuli for their enchantment rituals.'
- 'Venture into the mines and gather some!'
- ''
- '&eRewards:'
- '&7► 170 EXP'
- '&7► 17 Gold Coins'

level-req:
    main: 6

parent: []

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'mineblock{type=LAPIS_ORE;amount=20}'
        lore: 'Mine 20 lapis ore.'
        triggers:
        - message{format="&aAlchemist> &fSplendid lapis! The enchantments will flow with power."}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 17"}
        - 'experience{amount=170}'
