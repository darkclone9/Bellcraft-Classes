
# Display options
name: 'Pillager Raid'
lore:
- 'A pillager war band is marching toward'
- 'the village! Intercept them before'
- 'they can launch their attack!'
- ''
- '&eRewards:'
- '&7► 200 EXP'
- '&7► 20 Gold Coins'

level-req:
    main: 6

parent: []

bossbar:
    enabled: true
    objective: true

objectives:
