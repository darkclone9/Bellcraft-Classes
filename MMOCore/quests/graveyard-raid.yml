
# Display options
name: 'The Graveyard Raid'
lore:
- 'A haunted graveyard lies to the east.'
- 'Both zombies and skeletons rise there'
- 'each night. Cleanse the cursed ground!'
- ''
- '&eRewards:'
- '&7► 220 EXP'
- '&7► 22 Gold Coins'

parent:
- 'zombie-slayer'
- 'skeleton-hunt'

bossbar:
    enabled: true
    objective: true

objectives:
    1:
        type: 'killmob{type=ZOMBIE;amount=20}'
        lore: 'Kill 20 zombies in the graveyard.'
        triggers:
        - message{format="&aGuard> &fHalf the horde is down! Keep going!"}
        - sound{sound=ENTITY_EXPERIENCE_ORB_PICKUP;pitch=1;volume=1}
    2:
        type: 'killmob{type=SKELETON;amount=20}'
        lore: 'Kill 20 skeletons in the graveyard.'
        triggers:
        - message{format="&aGuard> &fThe graveyard is at peace once more. You are a true hero!"}
        - sound{sound=ENTITY_PLAYER_LEVELUP;pitch=1;volume=1}
        - command{format="mmocore coins %player_name% 22"}
        - 'experience{amount=220}'
