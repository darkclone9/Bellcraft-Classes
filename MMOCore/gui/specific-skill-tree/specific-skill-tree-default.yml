# Per-skill-tree GUI (default). Used by /skilltrees <id>
# Specific overrides can be made with:
# gui/specific-skill-tree/specific-skill-tree-<skill-tree-id>.yml

name: '{skill_tree}'
slots: 54

# Default node lore formats
node:
  unlocked:
    - '&a{status}'
    - ''
    - '&7Click to view details.'
  unlockable:
    - '&e{status}'
    - ''
    - '&aLeft click to unlock.'
    - '&7Click to view details.'
  locked:
    - '&7{status}'
    - ''
    - '&7Unlock previous nodes first.'
    - '&7Click to view details.'
  fully-locked:
    - '&c{status}'
    - ''
    - '&7You do not meet the requirements.'
    - '&7Click to view details.'

items:
  back:
    slots: [ 45 ]
    function: back
    item: BARRIER
    name: '&cBack'
    lore: { }

  next:
    slots: [ 52 ]
    function: next
    item: PLAYER_HEAD
    texture: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMTliZjMyOTJlMTI2YTEwNWI1NGViYTcxM2FhMWIxNTJkNTQxYTFkODkzODgyOWM1NjM2NGQxNzhlZDIyYmYifX19
    name: '&aNext'
    lore: { }

  previous:
    slots: [ 46 ]
    function: previous
    item: PLAYER_HEAD
    texture: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYmQ2OWUwNmU1ZGFkZmQ4NGU1ZjNkMWMyMTA2M2YyNTUzYjJmYTk0NWVlMWQ0ZDcxNTJmZGM1NDI1YmMxMmE5In19fQ==
    name: '&aPrevious'
    lore: { }

  reallocate:
    slots: [ 49 ]
    function: reallocation
    item: CAULDRON
    name: '&aReallocate Skill Tree Points'
    lore:
      - ''
      - 'You have spent a total of &6{total}&7 skill tree points.'
      - '&7Right click to reallocate them.'
      - ''
      - '&eCosts 1 skill tree reallocation point.'
      - '&e◆ Skill Tree Reallocation Points: &6{points}'

