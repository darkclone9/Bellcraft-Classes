display:
  name: 'Sorcerer'
  lore:
    - '&eClass Role: Caster DPS / Elementalist'
    - '&7An innate spellcaster who channels'
    - '&7raw elemental arcana to unleash'
    - '&7devastating magical destruction.'
  item: BLAZE_ROD
  slot: 22

mana:
  char: "☄"
  icon: "&c☄"
  name: 'Arcana'
  color:
    full: RED
    half: DARK_RED
    empty: DARK_GRAY

stats:
  MAX_HEALTH:
    base: 20.0
    per-level: 2.0
  MAX_MANA:
    base: 50.0
    per-level: 7.0
  MAGIC_DAMAGE:
    base: 6.0
    per-level: 2.5
  SKILL_DAMAGE:
    base: 4.0
    per-level: 1.5
  MANA_REGENERATION:
    base: 3.0
    per-level: 1.0
  MOVEMENT_SPEED:
    base: 0.11
    per-level: 0.0
  COOLDOWN_REDUCTION:
    base: 2.0
    per-level: 0.5
  ARMOR:
    base: 2.0
    per-level: 0.3

attributes:
  strength:
    base: 3
    per-level: 0.5
  dexterity:
    base: 6
    per-level: 1.0
  intelligence:
    base: 14
    per-level: 3.0
  wisdom:
    base: 5
    per-level: 1.0

options:
  default: false
  display: true
  needs-permission: false
  off-combat-health-regen: false
  off-combat-mana-regen: true

exp-curve: 'levels'
exp-table: class_exp_table

skill-slots:
  1:
    name: '&cFireball'
    unlocked-by-default: true
    lore:
      - '&7Launch a fiery projectile'
  2:
    name: '&bBlizzard'
    unlocked-by-default: true
    lore:
      - '&7Unleash freezing magic in an area'

main-exp-sources:
  - 'killmob{type=ZOMBIE;amount=1-2}'
  - 'killmob{type=SKELETON;amount=1-3}'
  - 'killmob{type=CREEPER;amount=2-4}'
  - 'killmob{type=BLAZE;amount=4-6}'
  - 'killmob{type=WITHER_SKELETON;amount=5-8}'
  - 'killmob{type=WITCH;amount=3-5}'

skill-trees:
  - 'sorcerer-elementalist'

# Use MythicLib builtin skills (known-good handlers)
skills:
  FIREBALL:
    level: 1
    max-level: 30
    unlocked-by-default: true

  BLIZZARD:
    level: 1
    max-level: 30
    unlocked-by-default: true

  # New skills
  SORCERER_ARCANE_MISSILES:
    level: 5
    max-level: 30
    unlocked-by-default: false

  SORCERER_ELEMENTAL_SHIELD:
    level: 10
    max-level: 30
    unlocked-by-default: false

  SORCERER_TIME_WARP:
    level: 15
    max-level: 30
    unlocked-by-default: false

triggers:
  level-up-multiple-4:
    - 'command{format="mmocore admin attribute-points give %player_name% 1"}'
    - 'command{format="mmocore admin skill-points give %player_name% 2"}'
    - 'command{format="mmocore admin skill-tree-points give %player% 1 sorcerer-elementalist"}'
