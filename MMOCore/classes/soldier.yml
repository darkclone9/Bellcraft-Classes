display:
  name: 'Soldier'
  lore:
    - '&eClass Role: Tank / Frontline Fighter'
    - '&7The Soldier is a master of combat,'
    - '&7hardened by battle and built to endure'
    - '&7punishment that would destroy lesser beings.'
  item: IRON_CHESTPLATE
  slot: 11

mana:
  char: '|'
  icon: '&b|'
  name: 'Resolve'
  color:
    full: RED
    half: DARK_RED
    empty: DARK_GRAY

stats:
  MAX_HEALTH:
    base: 30.0
    per-level: 4.0
  MAX_MANA:
    base: 25.0
    per-level: 3.0
  ATTACK_DAMAGE:
    base: 8.0
    per-level: 2.5
  PHYSICAL_DAMAGE:
    base: 3.0
    per-level: 1.2
  WEAPON_DAMAGE:
    base: 2.0
    per-level: 1.0
  ARMOR:
    base: 4.0
    per-level: 1.5
  KNOCKBACK_RESISTANCE:
    base: 10.0
    per-level: 1.0
  HEALTH_REGENERATION:
    base: 0.3
    per-level: 0.05
  MOVEMENT_SPEED:
    base: 0.10
    per-level: 0.0

attributes:
  strength:
    base: 16
    per-level: 3.0
  dexterity:
    base: 4
    per-level: 0.5

options:
  default: false
  display: true
  needs-permission: false
  off-combat-health-regen: true
  off-combat-mana-regen: true

exp-curve: 'levels'
exp-table: class_exp_table

skill-slots:
  1:
    name: "&cShield Bash"
    unlocked-by-default: true
    lore:
      - '&7Powerful circular slash attack'
  2:
    name: "&cDefensive Stance"
    unlocked-by-default: true
    lore:
      - '&7Magical shield for protection'

main-exp-sources:
  - 'killmob{type=ZOMBIE;amount=5-8}'
  - 'killmob{type=SKELETON;amount=5-8}'
  - 'killmob{type=CREEPER;amount=8-14}'
  - 'killmob{type=BLAZE;amount=10-18}'
  - 'killmob{type=WITHER_SKELETON;amount=14-22}'

skills:
  CIRCULAR_SLASH:
    level: 1
    max-level: 30
    unlocked-by-default: true

  MAGICAL_SHIELD:
    level: 1
    max-level: 30
    unlocked-by-default: true

  # New skills
  SOLDIER_SHIELD_BASH:
    level: 5
    max-level: 30
    unlocked-by-default: false

  SOLDIER_WARRIORS_LEAP:
    level: 10
    max-level: 30
    unlocked-by-default: false

  SOLDIER_BATTLE_CRY:
    level: 15
    max-level: 30
    unlocked-by-default: false

  # Standalone MythicLib skill unlocks (via skill tree)
  COMBAT_STANCE:
    level: 1
    max-level: 30
    unlocked-by-default: false

  SUPPRESSING_FIRE:
    level: 1
    max-level: 30
    unlocked-by-default: false

  TACTICAL_RELOAD:
    level: 1
    max-level: 30
    unlocked-by-default: false

skill-trees:
  - 'soldier'

triggers:
  level-up-multiple-4:
    - 'command{format="mmocore admin attribute-points give %player_name% 1"}'
    - 'command{format="mmocore admin skill-points give %player_name% 2"}'
    - 'command{format="mmocore admin skill-tree-points give %player% 1 soldier"}'
