name: Deploy Configs to Bloom.host

# This tells GitHub to run this script ONLY when a change is pushed to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # Only check out the actual plugin config folders so that .git, .github,
          # README.md, and NOTES.md are never present in the workspace and therefore
          # never uploaded to the server.
          sparse-checkout: |
            MMOCore
            MMOItems
            MMOInventory
            MMOProfiles
            MythicLib
            MythicMobs
            config

      - name: Sync files via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASS }}
          port: 2022

          # Upload only the checked-out plugin config folders to the server's /plugins folder.
          local_path: './'
          remote_path: 'plugins/'
          sftp_only: true
          # Pass a connect timeout so the job fails fast when the server is unreachable.
          # Note: use 'sftpArgs' (not 'args') — that is the correct input name for this action.
          # '--exclude' is an rsync/lftp flag and is not supported by sftp batch mode.
          sftpArgs: '-o ConnectTimeout=15'
