# GUI display name
name: 'Choose Your Character'
removal_name: 'Click to Remove'

# Number of slots in your inventory. Must be
# between 9 and 54 and must be a multiple of 9.
slots: 45

items:

  prev_page_item:
    function: previous-page
    slots: [ 9 ]

    item: PLAYER_HEAD
    name: "&6Previous Page"
    texture: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYmQ2OWUwNmU1ZGFkZmQ4NGU1ZjNkMWMyMTA2M2YyNTUzYjJmYTk0NWVlMWQ0ZDcxNTJmZGM1NDI1YmMxMmE5In19fQ==

  next_page_item:
    function: next-page
    slots: [ 17 ]

    item: PLAYER_HEAD
    name: "&6Next Page"
    texture: eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMTliZjMyOTJlMTI2YTEwNWI1NGViYTcxM2FhMWIxNTJkNTQxYTFkODkzODgyOWM1NjM2NGQxNzhlZDIyYmYifX19

  # Additional option for Geyser servers to remove
  # profiles without right-clicking the profile item
  removal:
    function: removal
    slots: [ 36 ]

    item: BARRIER
    name: "&6Profile Removal"

  # Kicks the player when clicked
  # To disable, erase/comment out this config section
  log_out:
    function: log_out
    slots: [ 44 ]

    kick_reason: 'You have successfully logged out.'
    item: BELL
    name: "&cLog Out"

  profile_item:
    function: profile
    slots: [ 10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25 ]

    # Can be disabled if the `removal` item above is in use.
    remove_on_right_click: true

    # Fallback placeholder if a placeholder does not exist or has
    # not been loaded yet from the database, such as {mmocore_class}
    # or any other that depends on player data from other plugins.
    fallback_placeholder: '[xxx]'

    no-slot:
      name: "&6"
      item: 'GRAY_STAINED_GLASS_PANE'
      lore: [ ]
    empty-slot:
      name: "&6[+] Create New Character"
      item: EMERALD
      lore: [ ]
    locked-slot:
      name: "&c{rank} Slot"
      item: REDSTONE
      lore:
        - ''
        - '&7You need to be &6{rank}&7 or higher'
        - '&7in order to unlock this slot.'

    # When players switch profiles, this item is used
    # when it is the profile the player is currently playing on
    current:
      item: PLAYER_HEAD
      name: "&6[{slot}] {profile_name} &a(Current)"
      lore:
        - ''
        - '&7Class &6{mmocore_class}'
        - '&7Level: &e{mmocore_level}'
        - '&7Exp: &e{mmocore_exp}&7/&e{mmocore_exp_next_level}'
        - '&7World: &e{world}'
        - ''
        - "&e↪ Right click to delete it."

    item: PLAYER_HEAD
    name: "&6[{slot}] {profile_name}"
    lore:
      - ''
      - '&7Class &6{mmocore_class}'
      - '&7Level: &e{mmocore_level}'
      - '&7Exp: &e{mmocore_exp}&7/&e{mmocore_exp_next_level}'
      - '&7World: &e{world}'
      - ''
      - "&e↪ Left click to select this character."
      - "&e↪ Right click to delete it."

