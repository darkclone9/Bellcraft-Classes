scene_help_message: |
  &6Scenes are basically a new menu linked to the parent GUI itself. They are shown to the player in order they are configured depending on the configured factors.
  &6You may use scenes to create animated GUIs, conditional GUIs, and much more!
  &8&m━━━━━━━━━━━━  &e&lʟᴀsᴛ ᴅᴇʟᴀʏ &8&m━━━━━━━━━━━━
  &6Every scene can have a last delay, except the last scene configured for a GUI, this delay determines the amount of time player will see the current scene before moving to the next scene, this delay is in ticks.
  &8&m━━━━  &e&lᴏᴘᴇɴ ᴄᴏɴᴅɪᴛɪᴏɴs & ᴏᴘᴇɴ ᴇᴠᴇɴᴛs &8&m━━━
  &6You can add open conditions to a scene as well as open events, the open conditions determine if the scene will be displayed to the player whereas the open events trigger if the scene is (and when) displayed to the player respectively.
  &8&m━━━━━━━━━━━━  &e&lsᴇᴛᴜᴘ ɪɴᴠᴇɴᴛᴏʀʏ &8&m━━━━━━━━━
  &6You can click the "&e&lSetup Inventory&6" button in the scene editor menu to setup the items for the selected scene. You may place the item in the inventory and right-click it to open the item editor to further customize the item.
