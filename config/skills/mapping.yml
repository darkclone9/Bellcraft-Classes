# Bellcraft Classes – Skill Mapping Reference
# This file documents the relationship between MythicLib skill IDs,
# the MMOCore classes that use them, and their skill tree node positions.
# It is a reference/documentation file and is not loaded by any plugin.

# -----------------------------------------------------------------------
# FORMAT:
#   skill_id:
#     display_name: "Human-readable name"
#     icon: MATERIAL_NAME
#     description: "What the skill does"
#     classes: [ClassName, ...]
#     tree:
#       class: TreeID
#       node_id: node_key_in_yml
#       position: "x: N, y: N"
#       prerequisite: none | node_id
# -----------------------------------------------------------------------

